[profile.default]
src = "src"
out = "out"
libs = ["lib"]
test = "test"
script = "script"
solc = "0.8.20"
optimizer = true
optimizer_runs = 200

# Number of fuzz runs for property-based tests
[profile.default.fuzz]
runs = 256
seed = "0x3e8"

# Increase runs for CI
[profile.ci.fuzz]
runs = 10000

[rpc_endpoints]
sei = "https://evm-rpc.sei-apis.com"
sei-testnet = "https://evm-rpc-testnet.sei-apis.com"

[etherscan]
sei = { key = "${SEITRACE_API_KEY}", url = "https://seitrace.com/api", chain = 1329 }
sei-testnet = { key = "${SEITRACE_API_KEY}", url = "https://seitrace.com/api?chain=atlantic-2", chain = 1328 }

[fmt]
line_length = 100
tab_width = 4
bracket_spacing = true
